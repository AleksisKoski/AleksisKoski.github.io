<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Fishing Minigame</title>
  <style>
    body {
      margin: 0;
      background: #222;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    canvas {
      image-rendering: pixelated;
    }
  </style>
</head>
<body>

<canvas id="game"></canvas>
<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let WIDTH, HEIGHT;

const bg = new Image();
const barImg = new Image();
const fishImg = new Image();

bg.src = "sd_bg.png";
barImg.src = "sd_bar.png";
fishImg.src = "sd_fish.png";

const greatImg = new Image();
greatImg.src = "sd_great.png";

Promise.all([
  new Promise(r => bg.onload = r),
  new Promise(r => barImg.onload = r),
  new Promise(r => fishImg.onload = r),
  new Promise(r => greatImg.onload = r)
]).then(start);

const GRAVITY = 0.4;
const CLICK_FORCE = -6;

const TOP_BOUNCE = 0.8;
const BOTTOM_BOUNCE = 0.4;

let FISH_MOVE_INTERVAL = 2500;
let RANDOM_FISH_INTERVAL = 2500;
let FISH_SPEED = 0.0;
let fishAccel = 0.06;
let fishTopSpd = 1.4;

const PROGRESS_UP_SPEED = 0.16;
const PROGRESS_DOWN_SPEED = 0.30;

let y, velocity;

let fishY, fishTargetY;
let fishTargetSign;
let lastFishMove = 0;
let firstMove = true;

let progress = 0;
let fishCaught = 0;

let mouseDown = false;

let showGreat = false;
let greatStartTime = 0;
let lastGreatTime = -Infinity;

const GREAT_DURATION = 1200;   // 2 seconds
const GREAT_COOLDOWN = 4000;  // 10 seconds

let greatOffsetY = 0;
let greatPos = 0;


window.addEventListener("mousedown", () => mouseDown = true);
window.addEventListener("mouseup", () => mouseDown = false);

window.addEventListener("touchstart", (e) => {
  mouseDown = true;
  e.preventDefault();
}, { passive: false });

window.addEventListener("touchend", () => {
  mouseDown = false;
});

window.addEventListener("keydown", e => {
  if (e.key === "c") mouseDown = true;
});

window.addEventListener("keyup", e => {
  if (e.key === "c") mouseDown = false;
});


function randomFishTarget() {
  const margin = BAR_HEIGHT * 0.05;
  return Math.random() * (
    (BAR_BOTTOM - margin - FISH_HEIGHT) - (BAR_TOP + 2*margin)
  ) + (BAR_TOP + 2*margin);
}


let lastTime = performance.now();

function loop(now) {
  const dt = now - lastTime;
  lastTime = now;
  const dtSeconds = dt / 1000;

  update(dt, dtSeconds, now);
  draw();

  requestAnimationFrame(loop);
}


function update(dt, dtSeconds, now) {

  // INPUT
  if (mouseDown) {
    velocity += CLICK_FORCE * 0.09 * dtSeconds * 60;
  }

  // PHYSICS
  velocity += GRAVITY * 0.6 * dtSeconds * 60;
  y += velocity * dtSeconds * 60;

  if (y < BAR_TOP) {
    y = BAR_TOP;
    velocity *= -TOP_BOUNCE;
  }

  if (y + BLOCK_HEIGHT > BAR_BOTTOM) {
    y = BAR_BOTTOM - BLOCK_HEIGHT;
    velocity *= -BOTTOM_BOUNCE;
  }

  // FISH TARGET CHANGE
  if (now - lastFishMove > RANDOM_FISH_INTERVAL || firstMove) {
	firstMove = false;
    fishTargetY = randomFishTarget();
    if (fishTargetY > fishY) {fishTargetSign = 1;
    } else {fishTargetSign = -1;}
    lastFishMove = now;
    RANDOM_FISH_INTERVAL = FISH_MOVE_INTERVAL*(0.7+0.6*Math.random())
  }

  // FISH MOVEMENT
  if (Math.abs(fishTargetY - fishY) > 1 && (fishTargetY-fishY)*fishTargetSign >= 0) {
	if (FISH_SPEED < fishTopSpd){
		FISH_SPEED = Math.min(FISH_SPEED + fishAccel * dtSeconds * 60,fishTopSpd);
	}
    const dir = fishTargetY > fishY ? 1 : -1;
    fishY += dir * FISH_SPEED * dtSeconds * 60;
  } else {FISH_SPEED = 0.0;}

  const fishCenter = fishY + FISH_HEIGHT / 2;
  const barTop = y;
  const barBottom = y + BLOCK_HEIGHT;

  const fishOnBar = fishCenter >= barTop && fishCenter <= barBottom;

  if (fishOnBar && !showGreat) {
    progress += PROGRESS_UP_SPEED * dtSeconds;
  } else {
    progress -= (1 + 2*showGreat) * PROGRESS_DOWN_SPEED * dtSeconds;
  }

  progress = Math.max(0, Math.min(1, progress));
  
  if (
  progress >= 1 &&
  now - lastGreatTime > GREAT_COOLDOWN &&
  !showGreat
) {
  fishCaught += 1;
  showGreat = true;
  greatPos = fishY;
  greatStartTime = now;
  lastGreatTime = now;
  greatOffsetY = 0;
}

if (showGreat) {
  const elapsed = now - greatStartTime;

  // move upward over time
  greatOffsetY = (elapsed / GREAT_DURATION) * 30;

  if (elapsed > GREAT_DURATION) {
    showGreat = false;
    progress = 0;
    FISH_MOVE_INTERVAL *= 0.92;
    fishTopSpd *= 1.09;
    fishAccel *= 1.09;
  }
}
}


function draw() {
  ctx.fillStyle = "magenta";
  ctx.fillRect(0, 0, WIDTH, HEIGHT);
  ctx.clearRect(0, 0, WIDTH, HEIGHT);

  ctx.drawImage(bg, 0, 0);

  // Player bar
  ctx.drawImage(barImg, BAR_X + 17, y);

  // Fish
  ctx.drawImage(
    fishImg,
    BAR_X + BAR_WIDTH / 2 - FISH_WIDTH / 2 + 11,
    fishY
  );

  // Progress bar
  const BAR_W = 14;
  const BAR_H = 576;

  const barX = WIDTH - BAR_W - 25;
  const barY = HEIGHT - BAR_H - 27;

  const fillHeight = BAR_H * progress;

  let r, g, b;

  if (progress < 0.5) {
    const t = progress / 0.5;
    r = 255;
    g = 255 * t;
    b = 0;
  } else {
    const t = (progress - 0.5) / 0.5;
    r = 255 * (1 - t);
    g = 255;
    b = 0;
  }

  ctx.fillStyle = `rgb(${r},${g},${b})`;

  if (fillHeight > 0) {
    ctx.fillRect(
      barX,
      barY + BAR_H - fillHeight,
      BAR_W,
      fillHeight
    );
  }
  if (showGreat) {
  const x = BAR_X + BAR_WIDTH / 2 - greatImg.width / 2 + 11;
  const yPos = greatPos - greatOffsetY;
  ctx.drawImage(
    greatImg,
    0, 29*Math.min(Math.floor(fishCaught/2),8), 138, 29,          // crop area
    x, yPos, 138, 29   // where + size
  );
}
}


function start() {
  WIDTH = bg.width;
  HEIGHT = bg.height;
  const scale = Math.min(
    window.innerWidth / WIDTH * 0.65,
    window.innerHeight / HEIGHT * 0.65
  );

  canvas.width = WIDTH * scale;
  canvas.height = HEIGHT * scale;

  ctx.setTransform(scale, 0, 0, scale, 0, 0);

  BAR_X = WIDTH / 2 - 25;
  BAR_WIDTH = 50;
  BAR_HEIGHT = HEIGHT - 50;
  BAR_TOP = HEIGHT - BAR_HEIGHT - 20;
  BAR_BOTTOM = BAR_TOP + BAR_HEIGHT - 14;

  BLOCK_WIDTH = barImg.width;
  BLOCK_HEIGHT = barImg.height;

  FISH_WIDTH = fishImg.width;
  FISH_HEIGHT = fishImg.height;

  y = BAR_BOTTOM - BLOCK_HEIGHT;
  velocity = 0;

  fishY = (BAR_BOTTOM)*0.3;
  fishTargetY = randomFishTarget();
  lastFishMove = performance.now();
  requestAnimationFrame(loop);
}
</script>

</body>
</html>
